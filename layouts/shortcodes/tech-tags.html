{{/* Renders a comma-separated list of technologies as inline pill tags.
     Usage: {{< tech-tags "GCP, GKE, Terraform" >}} */}}
{{ $raw := .Get 0 }}
{{ $tags := split $raw "," }}
<div class="tech-tags">
  {{ range $tags }}
    {{ $trimmed := strings.TrimSpace . }}
    {{ if $trimmed }}
      <span class="tech-tag">{{ $trimmed }}</span>
    {{ end }}
  {{ end }}
</div>
