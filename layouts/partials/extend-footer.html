{{/* Color scheme rotation — cycles through brand schemes every 5-7 seconds.
     Remove this partial when ready to launch with a fixed scheme. */}}
<script>
(function () {
  const schemes = [
    {
      name: "Forge Blue",
      neutral:    ["255,255,255","248,250,252","241,245,249","226,232,240","203,213,225","148,163,184","100,116,139","71,85,105","51,65,85","30,41,59","15,23,42"],
      primary:    ["239,246,255","219,234,254","191,219,254","147,197,253","96,165,250","59,130,246","37,99,235","29,78,216","30,64,175","30,58,138"],
      secondary:  ["245,243,255","237,233,254","221,214,254","196,181,253","167,139,250","139,92,246","124,58,237","109,40,217","91,33,182","76,29,149"]
    },
    {
      name: "Ember",
      neutral:    ["255,255,255","250,250,249","245,245,244","231,229,228","214,211,209","168,162,158","120,113,108","87,83,78","68,64,60","41,37,36","28,25,23"],
      primary:    ["254,242,242","254,226,226","254,202,202","252,165,165","248,113,113","239,68,68","220,38,38","185,28,28","153,27,27","127,29,29"],
      secondary:  ["239,246,255","219,234,254","191,219,254","147,197,253","96,165,250","59,130,246","37,99,235","29,78,216","30,64,175","30,58,138"]
    },
    {
      name: "Violet Forge",
      neutral:    ["255,255,255","250,250,250","244,244,245","228,228,231","212,212,216","161,161,170","113,113,122","82,82,91","63,63,70","39,39,42","24,24,27"],
      primary:    ["250,245,255","243,232,255","233,213,255","216,180,254","192,132,252","168,85,247","147,51,234","126,34,206","107,33,168","88,28,135"],
      secondary:  ["254,242,242","254,226,226","254,202,202","252,165,165","248,113,113","239,68,68","220,38,38","185,28,28","153,27,27","127,29,29"]
    }
  ];

  const neutralKeys = ["","50","100","200","300","400","500","600","700","800","900"];
  const shadeKeys   = ["50","100","200","300","400","500","600","700","800","900"];

  let index = 0;

  function apply(scheme) {
    const root = document.documentElement.style;
    scheme.neutral.forEach(function (v, i) {
      root.setProperty("--color-neutral" + (neutralKeys[i] ? "-" + neutralKeys[i] : ""), v);
    });
    scheme.primary.forEach(function (v, i) {
      root.setProperty("--color-primary-" + shadeKeys[i], v);
    });
    scheme.secondary.forEach(function (v, i) {
      root.setProperty("--color-secondary-" + shadeKeys[i], v);
    });
  }

  function rotate() {
    apply(schemes[index]);
    index = (index + 1) % schemes.length;
    var delay = 5000 + Math.random() * 2000; // 5-7 seconds
    setTimeout(rotate, delay);
  }

  rotate();
})();
</script>
