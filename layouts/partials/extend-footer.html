<script>
(function () {
  // Bail early for reduced-motion users: no class added, all content stays visible
  if (window.matchMedia('(prefers-reduced-motion: reduce)').matches) return;

  // Opt-in: add class so CSS can hide [data-reveal] elements
  document.documentElement.classList.add('js-reveal-init');

  // Scroll-reveal observer
  var revealObserver = new IntersectionObserver(
    function (entries) {
      entries.forEach(function (entry) {
        if (entry.isIntersecting) {
          entry.target.classList.add('revealed');
          revealObserver.unobserve(entry.target);
        }
      });
    },
    { threshold: 0.15, rootMargin: '0px 0px -50px 0px' }
  );

  document
    .querySelectorAll('[data-reveal], [data-reveal-stagger]')
    .forEach(function (el) {
      revealObserver.observe(el);
    });

  // Hero gradient pause when scrolled out of view
  var heroEl = document.querySelector('.hero-gradient-bg');
  if (heroEl) {
    var heroBefore = heroEl; // animation is on the element's ::before
    var heroObserver = new IntersectionObserver(
      function (entries) {
        entries.forEach(function (entry) {
          heroBefore.style.animationPlayState = entry.isIntersecting
            ? 'running'
            : 'paused';
        });
      },
      { threshold: 0 }
    );
    heroObserver.observe(heroEl);
  }

  // Animated metric counters
  var counterObserver = new IntersectionObserver(
    function (entries) {
      entries.forEach(function (entry) {
        if (!entry.isIntersecting) return;
        var el = entry.target;
        var display = el.getAttribute('data-counter');
        var target = parseInt(el.getAttribute('data-target'), 10);
        counterObserver.unobserve(el);

        if (isNaN(target)) return;

        var prefix = display.match(/^[^0-9]*/)[0];
        var suffix = display.match(/[^0-9]*$/)[0];
        var duration = 2000;
        var start = null;

        requestAnimationFrame(function tick(now) {
          if (!start) start = now;
          var progress = Math.min((now - start) / duration, 1);
          var eased = 1 - Math.pow(1 - progress, 3); // easeOutCubic
          el.textContent =
            prefix + Math.floor(eased * target).toLocaleString() + (progress >= 1 ? suffix : '');
          if (progress < 1) requestAnimationFrame(tick);
        });
      });
    },
    { threshold: 0.3 }
  );

  document.querySelectorAll('[data-counter]').forEach(function (el) {
    counterObserver.observe(el);
  });
})();
</script>

<!-- Tech bar carousel navigation -->
<script>
(function () {
  var list = document.getElementById('tech-carousel-items');
  var dotsWrap = document.getElementById('tech-carousel-dots');
  if (!list) return;

  var items = Array.from(list.children);
  var perPage = 8;
  var total = Math.ceil(items.length / perPage);
  var current = 0;
  var autoTimer = null;
  var autoDelay = 5000;
  var direction = 1; // 1 = forward, -1 = backward

  var prevBtn = document.querySelector('.tech-carousel-prev');
  var nextBtn = document.querySelector('.tech-carousel-next');

  // Build dots with progress indicator
  for (var d = 0; d < total; d++) {
    var dot = document.createElement('button');
    dot.className = 'tech-carousel-dot' + (d === 0 ? ' active' : '');
    dot.setAttribute('aria-label', 'Page ' + (d + 1));
    dot.dataset.page = d;
    dot.addEventListener('click', function () {
      goTo(parseInt(this.dataset.page), 'slide');
      resetAuto();
    });
    dotsWrap.appendChild(dot);
  }

  function goTo(idx, animation) {
    if (idx === current) return;
    var dir = idx > current ? 'right' : 'left';
    var anim = animation || 'slide';

    // Fade out current page items
    items.forEach(function (item, i) {
      var page = Math.floor(i / perPage);
      if (page === current) {
        item.classList.add('tech-item-exit');
        item.classList.remove('tech-item-enter');
      }
    });

    // After exit animation, swap pages
    setTimeout(function () {
      current = idx;
      items.forEach(function (item, i) {
        var page = Math.floor(i / perPage);
        item.classList.remove('tech-item-exit');
        if (page === current) {
          item.style.display = '';
          item.classList.add('tech-item-enter');
          item.style.animationDelay = '';
        } else {
          item.style.display = 'none';
          item.classList.remove('tech-item-enter');
        }
      });

      var dots = dotsWrap.querySelectorAll('.tech-carousel-dot');
      dots.forEach(function (dot, i) {
        dot.classList.toggle('active', i === current);
      });
      prevBtn.disabled = current === 0;
      nextBtn.disabled = current === total - 1;

      // Update progress bar on active dot
      dots.forEach(function (dot) { dot.style.removeProperty('--progress'); });
      startProgress();
    }, 200);
  }

  function startProgress() {
    var dots = dotsWrap.querySelectorAll('.tech-carousel-dot');
    var activeDot = dots[current];
    if (activeDot) {
      activeDot.classList.add('progressing');
      setTimeout(function () {
        activeDot.classList.remove('progressing');
      }, autoDelay);
    }
  }

  function autoAdvance() {
    var next = current + direction;
    if (next >= total) {
      direction = -1;
      next = current - 1;
    } else if (next < 0) {
      direction = 1;
      next = current + 1;
    }
    goTo(next, 'slide');
  }

  function resetAuto() {
    clearInterval(autoTimer);
    autoTimer = setInterval(autoAdvance, autoDelay);
    startProgress();
  }

  prevBtn.addEventListener('click', function () {
    if (current > 0) goTo(current - 1, 'slide');
    resetAuto();
  });
  nextBtn.addEventListener('click', function () {
    if (current < total - 1) goTo(current + 1, 'slide');
    resetAuto();
  });

  // Pause on hover
  var carousel = document.querySelector('.tech-carousel');
  carousel.addEventListener('mouseenter', function () {
    clearInterval(autoTimer);
  });
  carousel.addEventListener('mouseleave', function () {
    resetAuto();
  });

  // Initialize
  items.forEach(function (item, i) {
    if (Math.floor(i / perPage) !== 0) item.style.display = 'none';
  });

  // Start auto-advance (skip if reduced motion)
  if (!window.matchMedia('(prefers-reduced-motion: reduce)').matches) {
    autoTimer = setInterval(autoAdvance, autoDelay);
    startProgress();
  }
})();
</script>
