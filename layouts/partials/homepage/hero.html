<section class="homepage-hero hero-gradient-bg" aria-labelledby="hero-heading">
  <div class="relative z-10 mx-auto max-w-5xl px-4 py-16 text-center sm:py-20">
    {{ with .Params.hero }}
      <h1 id="hero-heading" class="homepage-hero-heading mb-6 font-extrabold tracking-tight text-neutral-800 dark:text-neutral-100">
        {{ .headline }}
      </h1>
      {{ with .subheadline }}
        <p class="homepage-hero-sub mx-auto mt-0 mb-8">
          {{ . }}
        </p>
      {{ end }}
    {{ end }}
    {{ with .Content }}
      <p id="problem-heading" class="hero-problem-text mx-auto mt-0 mb-10">
        {{ . | plainify }}
      </p>
    {{ end }}
    <div class="flex flex-wrap items-center justify-center gap-4">
      <a href="/contact/"
         class="hero-btn-primary" style="text-decoration:none">
        Let's Talk
      </a>
      <a href="/case-studies/"
         class="hero-btn-secondary" style="text-decoration:none">
        See Our Work
      </a>
    </div>
  </div>
</section>
