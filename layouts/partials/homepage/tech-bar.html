{{ with site.Data.technologies.items }}
  <section class="homepage-tech-bar" aria-labelledby="tech-bar-heading">
    <div class="mx-auto max-w-5xl px-4 py-10" data-reveal>
      <h2 id="tech-bar-heading" class="mb-5 text-center text-xs font-medium uppercase tracking-widest text-neutral-400 dark:text-neutral-500">
        Technologies we work with
      </h2>
      <ul class="flex flex-wrap items-center justify-center gap-x-8 gap-y-3 list-none p-0 m-0">
        {{ range . }}
          <li class="tech-label flex items-center gap-2 text-sm font-medium text-neutral-500 dark:text-neutral-400">
            {{ with .icon }}
              <span class="inline-block h-4 w-4 opacity-50" aria-hidden="true">
                {{ partial "icon.html" . }}
              </span>
            {{ end }}
            {{ .name }}
          </li>
        {{ end }}
      </ul>
    </div>
  </section>
{{ end }}
