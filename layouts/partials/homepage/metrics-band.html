{{ with site.Data.metrics.items }}
  <section class="homepage-metrics" aria-labelledby="metrics-heading">
    <div class="mx-auto max-w-5xl px-4 py-16">
      <h2 id="metrics-heading" class="metrics-heading" data-reveal>
        Results at Scale
      </h2>
      <div class="metrics-row" data-reveal-stagger>
        {{ $total := len . }}
        {{ range $i, $item := . }}
          <div class="metric-item">
            <span class="homepage-metric-value"
              {{- if findRE "^[\\$]?[0-9]" $item.value }}
                data-counter="{{ $item.value }}"
                data-target="{{ replaceRE "[^0-9]" "" $item.value }}"
              {{- end }}>
              {{ $item.value }}
            </span>
            <span class="metric-label">
              {{ $item.label }}
            </span>
          </div>
          {{ if lt (add $i 1) $total }}
            <div class="metric-divider" aria-hidden="true"></div>
          {{ end }}
        {{ end }}
      </div>
    </div>
  </section>
{{ end }}
