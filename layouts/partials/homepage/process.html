{{ with site.Data.process.steps }}
  <section class="homepage-process" aria-labelledby="process-heading">
    <div class="mx-auto max-w-5xl px-4 py-16">
      <h2 id="process-heading" class="mb-10 text-center font-bold text-neutral-800 dark:text-neutral-100">
        How We Work
      </h2>
      <ol class="numbered-steps process-steps">
        {{ range . }}
          <li class="process-step">
            <span class="process-step-icon" aria-hidden="true">
              {{ partial "icon.html" .icon }}
            </span>
            <strong>{{ .title }}</strong>
            <span>{{ .description }}</span>
          </li>
        {{ end }}
      </ol>
    </div>
  </section>
{{ end }}
