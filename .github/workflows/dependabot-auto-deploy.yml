name: Dependabot Auto-Deploy
# WARNING: This workflow triggers on the "Validate" workflow name (exact match).
# Renaming validate.yml's `name:` field will silently break auto-deploy.

on:
  workflow_run:
    workflows: ["Validate"]
    types: [completed]
    # Only fire for Dependabot branches. Eliminates the "skipped" runs that
    # appear in the Actions tab when non-Dependabot PRs complete Validate.
    branches: ["dependabot/**"]

# Shares concurrency group with deploy.yml and scheduled-deploy.yml.
# With cancel-in-progress: false, auto-deploys queue behind running deploys.
concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  checks: read

jobs:
  auto-deploy:
    # workflow_run.branches filter already restricts firings to dependabot/**;
    # the startsWith() check is retained as defense-in-depth.
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      startsWith(github.event.workflow_run.head_branch, 'dependabot/')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    environment: production
    steps:
      # ── Find PR and verify Dependabot author ────────────────────
      - name: Find PR and verify Dependabot author
        id: pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const branch = context.payload.workflow_run.head_branch;
            const validatedSha = context.payload.workflow_run.head_sha;
            const triggerRunId = context.payload.workflow_run.id;

            async function skipAndComment(prNumber, reason) {
              core.info(`PR #${prNumber}: ${reason}`);
              try {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body: [
                    '<!-- dependabot-auto-deploy-skip -->',
                    '# Dependabot Auto-Deploy Skipped',
                    '',
                    reason,
                    '',
                    'Resolve the reason above, then push a new commit (or remove the blocking label) to re-trigger.',
                  ].join('\n'),
                });
              } catch (e) {
                core.warning(`Failed to post skip comment on PR #${prNumber}: ${e.message}`);
              }
            }

            const { data: prs } = await github.rest.pulls.list({
              owner: context.repo.owner,
              repo: context.repo.repo,
              head: `${context.repo.owner}:${branch}`,
              state: 'open',
            });

            if (prs.length === 0) {
              core.info(`No open PR found for branch ${branch}`);
              return;
            }

            const pr = prs[0];

            if (pr.user.login !== 'dependabot[bot]' || pr.user.type !== 'Bot') {
              core.info(
                `PR #${pr.number} author is ${pr.user.login} (${pr.user.type}), not dependabot[bot]. Skipping.`
              );
              return;
            }

            if (pr.head.sha !== validatedSha) {
              // SHA moved between Validate and this run; the next Validate+run
              // pair will re-evaluate. Post a comment so the skip is visible.
              await skipAndComment(
                pr.number,
                `HEAD (\`${pr.head.sha.substring(0, 7)}\`) differs from the commit that Validate ran on (\`${validatedSha.substring(0, 7)}\`). The next Validate run will re-trigger auto-deploy.`
              );
              return;
            }

            // Verify Dependabot's signed-commit chain. Dependabot signs every
            // commit with GitHub's GPG key; unverified commits indicate a push
            // from a different actor onto the branch.
            let headCommit;
            try {
              const { data } = await github.rest.repos.getCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: pr.head.sha,
              });
              headCommit = data;
            } catch (e) {
              core.setFailed(`Failed to fetch HEAD commit for PR #${pr.number}: ${e.message}`);
              return;
            }

            if (!headCommit.commit.verification || !headCommit.commit.verification.verified) {
              const reason = headCommit.commit.verification
                ? headCommit.commit.verification.reason
                : 'unknown';
              await skipAndComment(
                pr.number,
                `HEAD commit signature is not verified (reason: \`${reason}\`). Auto-deploy requires a Dependabot-signed commit.`
              );
              return;
            }

            const headAuthor = headCommit.author && headCommit.author.login;
            if (headAuthor !== 'dependabot[bot]') {
              await skipAndComment(
                pr.number,
                `HEAD commit author is \`${headAuthor || 'unknown'}\`, not \`dependabot[bot]\`. Auto-deploy requires a Dependabot-authored commit.`
              );
              return;
            }

            // Refuse to auto-deploy if the PR touches CI/CD plumbing. A
            // Dependabot-bumped action whose metadata changes could otherwise
            // self-modify the deploy path.
            try {
              const files = await github.paginate(github.rest.pulls.listFiles, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: pr.number,
                per_page: 100,
              });
              const ciPaths = files
                .map((f) => f.filename)
                .filter(
                  (p) =>
                    p.startsWith('.github/workflows/') ||
                    p.startsWith('.github/actions/') ||
                    p.startsWith('.github/scripts/')
                );
              if (ciPaths.length > 0) {
                await skipAndComment(
                  pr.number,
                  `PR modifies CI/CD files (${ciPaths.map((p) => `\`${p}\``).join(', ')}). Auto-deploy requires manual review for these paths.`
                );
                return;
              }
            } catch (e) {
              core.setFailed(`Failed to list PR files for #${pr.number}: ${e.message}`);
              return;
            }

            // Require that main has not advanced past the PR's base. If it
            // has, the PR was built against stale main; Dependabot will
            // rebase and the next Validate run will re-trigger.
            let baseHead;
            try {
              const { data } = await github.rest.repos.getBranch({
                owner: context.repo.owner,
                repo: context.repo.repo,
                branch: pr.base.ref,
              });
              baseHead = data.commit.sha;
            } catch (e) {
              core.setFailed(`Failed to read base branch ${pr.base.ref}: ${e.message}`);
              return;
            }
            if (baseHead !== pr.base.sha) {
              await skipAndComment(
                pr.number,
                `Base branch \`${pr.base.ref}\` has advanced since this PR was built (from \`${pr.base.sha.substring(0, 7)}\` to \`${baseHead.substring(0, 7)}\`). Dependabot will rebase and re-trigger auto-deploy.`
              );
              return;
            }

            // Detect major-version bumps. Dependabot titles and bodies use
            // patterns like "from 1.2.3 to 2.0.0" (single) or multiple such
            // lines for grouped PRs. Major bumps require explicit approval
            // via the `auto-deploy-major` label.
            const labels = pr.labels.map((l) => l.name);
            if (labels.includes('manual-review')) {
              core.info(`PR #${pr.number} has manual-review label. Skipping auto-deploy.`);
              return;
            }

            const bumpRegex = /from\s+v?(\d+)(?:\.\d+){0,2}[^\s]*\s+to\s+v?(\d+)(?:\.\d+){0,2}/gi;
            const haystack = `${pr.title}\n${pr.body || ''}`;
            const majorBumps = [];
            let m;
            while ((m = bumpRegex.exec(haystack)) !== null) {
              const fromMajor = parseInt(m[1], 10);
              const toMajor = parseInt(m[2], 10);
              if (toMajor > fromMajor) {
                majorBumps.push(`${m[0]}`);
              }
            }
            if (majorBumps.length > 0 && !labels.includes('auto-deploy-major')) {
              await skipAndComment(
                pr.number,
                `Detected major-version bump(s): ${majorBumps
                  .slice(0, 5)
                  .map((s) => `\`${s}\``)
                  .join(', ')}. Auto-deploy requires the \`auto-deploy-major\` label for major updates.`
              );
              return;
            }

            core.setOutput('number', pr.number);
            core.setOutput('sha', pr.head.sha);
            core.setOutput('short_sha', pr.head.sha.substring(0, 7));
            core.setOutput('ref', pr.head.ref);
            core.setOutput('base_ref', pr.base.ref);
            core.setOutput('trigger_run_id', String(triggerRunId));
            core.info(`Will auto-deploy Dependabot PR #${pr.number} (${branch})`);

      # ── Verify validation passed on HEAD commit ─────────────────
      - name: Verify validation passed
        if: steps.pr.outputs.number
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_SHA: ${{ steps.pr.outputs.sha }}
          TRIGGER_RUN_ID: ${{ steps.pr.outputs.trigger_run_id }}
        with:
          script: |
            const triggerRunId = process.env.TRIGGER_RUN_ID;
            // Paginate to catch check runs beyond the default page of 30
            // (Validate re-runs accumulate here), then filter to GitHub
            // Actions runs tied to this workflow_run's Validate execution.
            const checkRuns = await github.paginate(github.rest.checks.listForRef, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              ref: process.env.PR_SHA,
              per_page: 100,
            });
            const candidates = checkRuns
              .filter(
                (cr) =>
                  cr.name === 'validate' &&
                  cr.app &&
                  cr.app.slug === 'github-actions' &&
                  cr.status === 'completed'
              )
              .sort(
                (a, b) =>
                  new Date(b.completed_at || 0) - new Date(a.completed_at || 0)
              );
            // Prefer the check run tied to the triggering workflow_run; fall
            // back to the most-recent completed candidate if the details_url
            // link isn't populated (rare race during reporting).
            const validate =
              candidates.find(
                (cr) => cr.details_url && cr.details_url.includes(`/runs/${triggerRunId}`)
              ) || candidates[0];
            if (!validate) {
              core.setFailed(
                `No completed github-actions 'validate' check run found for commit ${process.env.PR_SHA}.`
              );
              return;
            }
            if (validate.conclusion !== 'success') {
              core.setFailed(
                `Validation not passed (${validate.status}/${validate.conclusion}).`
              );
            }

      # ── Checkout PR branch ──────────────────────────────────────
      # Always checkout (even after verify-step failure) so require()
      # can resolve the shared retry helper in the merge/report and
      # failure-report steps.
      # Pins to the validated SHA (not branch name) to prevent TOCTOU
      # if someone force-pushes between verification and checkout.
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        if: "!cancelled() && steps.pr.outputs.number"
        with:
          ref: ${{ steps.pr.outputs.sha }}
          fetch-depth: 0

      # ── Build and deploy ────────────────────────────────────────
      - name: Build and Deploy
        if: success() && steps.pr.outputs.number
        id: hugo-deploy
        uses: ./.github/actions/hugo-deploy
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      # ── Merge PR and report success ─────────────────────────────
      - name: Merge PR and report success
        if: success() && steps.pr.outputs.number
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_SHA: ${{ steps.pr.outputs.sha }}
          PR_SHORT_SHA: ${{ steps.pr.outputs.short_sha }}
          PR_REF: ${{ steps.pr.outputs.ref }}
          PR_BASE_REF: ${{ steps.pr.outputs.base_ref }}
          BUILD_OUTPUT: ${{ steps.hugo-deploy.outputs.build-output }}
          DEPLOY_OUTPUT: ${{ steps.hugo-deploy.outputs.deploy-output }}
        with:
          script: |
            const { withRetry } = require('./.github/scripts/github-api-retry.js');

            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const prSha = process.env.PR_SHA;
            const sha = process.env.PR_SHORT_SHA;
            const ref = process.env.PR_REF;
            const baseRef = process.env.PR_BASE_REF;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const buildOutput = process.env.BUILD_OUTPUT || 'No output captured.';
            const deployOutput = process.env.DEPLOY_OUTPUT || 'No output captured.';

            // Re-fetch the PR and assert HEAD still matches the deployed
            // commit. If HEAD moved between checkout and now, we just
            // deployed stale code; surface that loudly rather than silently
            // merging whatever HEAD has become.
            let headDrifted = false;
            let currentHead = prSha;
            try {
              const { data: freshPr } = await github.rest.pulls.get({
                owner: context.repo.owner,
                repo: context.repo.repo,
                pull_number: prNumber,
              });
              currentHead = freshPr.head.sha;
              if (currentHead !== prSha) {
                headDrifted = true;
                core.warning(
                  `PR HEAD moved from ${prSha} to ${currentHead} between deploy and merge. Deployed code no longer matches PR; skipping merge.`
                );
              }
            } catch (e) {
              core.warning(`Failed to re-fetch PR #${prNumber} before merge: ${e.message}`);
            }

            // Squash merge with SHA guard (merge only if HEAD still matches)
            let merged = false;
            let mergeError = '';
            if (!headDrifted) {
              try {
                await withRetry(
                  () =>
                    github.rest.pulls.merge({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: prNumber,
                      merge_method: 'squash',
                      sha: prSha,
                    }),
                  { attempts: 3, delayMs: 2000, label: 'Squash merge', core }
                );
                merged = true;
              } catch (e) {
                mergeError = e.message;
              }
            }

            // Delete branch. Swallow 404/422 (already deleted or repo auto-
            // delete beat us to it) but warn on anything else so operators
            // see the signal in the Actions log.
            let branchDeleted = false;
            if (merged) {
              try {
                await withRetry(
                  () =>
                    github.rest.git.deleteRef({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      ref: `heads/${ref}`,
                    }),
                  { attempts: 2, delayMs: 1000, label: 'Delete branch', core }
                );
                branchDeleted = true;
              } catch (e) {
                if (e.status === 404 || e.status === 422) {
                  core.info(`Branch ${ref} already deleted (status ${e.status}).`);
                } else {
                  core.warning(
                    `Failed to delete branch ${ref} (status ${e.status || 'unknown'}): ${e.message}`
                  );
                }
              }
            }

            let mergeStatus;
            if (headDrifted) {
              mergeStatus = `**HEAD drift detected:** deployed \`${prSha.substring(0, 7)}\` but PR HEAD is now \`${currentHead.substring(0, 7)}\`. The deployment is live but the PR was not merged; revert or push a corrective commit.`;
            } else if (merged) {
              mergeStatus = `Merged \`${ref}\` into \`${baseRef}\`${branchDeleted ? ' and deleted the branch.' : '.'}`;
            } else {
              mergeStatus = `**Merge failed:** ${mergeError}\n\nThe deployment is live, but the PR must be merged manually.`;
            }

            const body = [
              '<!-- dependabot-auto-deploy -->',
              '# Deployment Report',
              '',
              'Deployed successfully via Dependabot auto-deploy.',
              '',
              '| | |',
              '|:--|:--|',
              `| **Commit** | \`${sha}\` |`,
              `| **Branch** | \`${ref}\` |`,
              `| **Workflow run** | [#${context.runNumber}](${runUrl}) |`,
              '',
              '---',
              '',
              '<details><summary><strong>Build output</strong> (<code>hugo</code>)</summary>',
              '',
              '```',
              buildOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary><strong>Deploy output</strong> (<code>wrangler</code>)</summary>',
              '',
              '```',
              deployOutput,
              '```',
              '',
              '</details>',
              '',
              '---',
              '',
              mergeStatus,
            ].join('\n');

            await withRetry(
              () =>
                github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                }),
              { attempts: 3, delayMs: 2000, label: 'Post deploy comment', core }
            );

      # ── Report failure ──────────────────────────────────────────
      - name: Report failure
        if: failure() && steps.pr.outputs.number
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PR_NUMBER: ${{ steps.pr.outputs.number }}
          PR_SHORT_SHA: ${{ steps.pr.outputs.short_sha }}
          PR_REF: ${{ steps.pr.outputs.ref }}
          BUILD_EXIT: ${{ steps.hugo-deploy.outputs.build-exit-code }}
          BUILD_OUTPUT: ${{ steps.hugo-deploy.outputs.build-output }}
          DEPLOY_OUTPUT: ${{ steps.hugo-deploy.outputs.deploy-output }}
          DEPLOY_STDERR: ${{ steps.hugo-deploy.outputs.deploy-stderr }}
        with:
          script: |
            const { withRetry } = require('./.github/scripts/github-api-retry.js');

            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const sha = process.env.PR_SHORT_SHA;
            const ref = process.env.PR_REF;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const buildExit = process.env.BUILD_EXIT || '';
            const buildOutput = process.env.BUILD_OUTPUT || '';
            const deployOutput = process.env.DEPLOY_OUTPUT || '';
            const deployStderr = process.env.DEPLOY_STDERR || '';

            let failStage, errorDetail;
            if (buildExit === '') {
              failStage = 'Pre-deploy Checks';
              errorDetail =
                'Validation or setup failed before the build started. See the workflow run for details.';
            } else if (buildExit !== '0') {
              failStage = 'Hugo Build';
              errorDetail =
                buildOutput || 'Build did not produce output. See the workflow run for details.';
            } else {
              failStage = 'Cloudflare Workers Deploy';
              errorDetail =
                deployStderr || deployOutput || 'See the workflow run for details.';
            }

            const body = [
              '<!-- dependabot-auto-deploy -->',
              '# Deployment Report',
              '',
              `Auto-deploy failed at **${failStage}**. The PR remains open for manual review.`,
              '',
              '| | |',
              '|:--|:--|',
              `| **Commit** | \`${sha}\` |`,
              `| **Branch** | \`${ref}\` |`,
              `| **Failed stage** | ${failStage} |`,
              `| **Workflow run** | [#${context.runNumber}](${runUrl}) |`,
              '',
              '---',
              '',
              '<details open><summary><strong>Error details</strong></summary>',
              '',
              '```',
              errorDetail,
              '```',
              '',
              '</details>',
              '',
              '---',
              '',
              'Fix the issue, push a new commit, and wait for validation. Auto-deploy will retry automatically.',
            ].join('\n');

            await withRetry(
              () =>
                github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  body,
                }),
              { attempts: 3, delayMs: 2000, label: 'Post failure comment', core }
            );

      # ── Report failure when PR identification itself failed ─────
      # Fires when the Find PR step threw before setting outputs (transient
      # API error, etc). Writes to the job summary so the failure is visible
      # in the Actions UI even without a PR comment.
      - name: Report pre-identification failure
        if: failure() && !steps.pr.outputs.number
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          TRIGGER_BRANCH: ${{ github.event.workflow_run.head_branch }}
          TRIGGER_SHA: ${{ github.event.workflow_run.head_sha }}
          TRIGGER_RUN_ID: ${{ github.event.workflow_run.id }}
        with:
          script: |
            const branch = process.env.TRIGGER_BRANCH || '(unknown)';
            const sha = (process.env.TRIGGER_SHA || '').substring(0, 7) || '(unknown)';
            const triggerRunId = process.env.TRIGGER_RUN_ID || '(unknown)';
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const summary = [
              '## Dependabot Auto-Deploy: Pre-identification Failure',
              '',
              'The workflow failed before it could identify the target PR.',
              '',
              `- **Triggering branch:** \`${branch}\``,
              `- **Triggering commit:** \`${sha}\``,
              `- **Triggering Validate run:** \`${triggerRunId}\``,
              `- **This workflow run:** [#${context.runNumber}](${runUrl})`,
              '',
              'No PR comment was posted because the PR was never identified.',
              'Investigate the failed step above (typically a transient GitHub API error).',
            ].join('\n');
            await core.summary.addRaw(summary).write();
