name: Preview

# Draft (preview) deployments. On every push to a PR, build the Hugo site and
# stage it as a non-production Cloudflare Worker *version*, then post a clickable
# preview URL on the PR. Production is untouched; that still happens only via the
# comment-driven `deploy` flow in deploy.yml.

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review, closed]

# Least privilege by default; each job widens only what it needs.
permissions: {}

jobs:
  deploy-preview:
    # Per-job concurrency (not workflow-level) so a `closed` event's cleanup
    # run is never cancelled by a deploy group: a new push supersedes an
    # in-flight preview upload, but cleanup runs in its own non-cancellable
    # group below. Separate from production's `deploy-production` group so
    # preview churn never serializes behind or cancels a production deploy.
    concurrency:
      group: preview-deploy-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: true
    # Skip on close (handled by `cleanup`), on drafts, on fork PRs (their token
    # is read-only and has no secrets, so wrangler can't authenticate), and on
    # Dependabot (its separate secrets scope leaves CLOUDFLARE_* empty, and a
    # dependency bump doesn't change the rendered site).
    if: >-
      github.event.action != 'closed'
      && github.event.pull_request.draft == false
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.user.login != 'dependabot[bot]'
    name: deploy-preview
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout PR head
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}
          persist-credentials: false

      # PR branches that predate the shared retry module need the file copied
      # from main so the require() in the comment steps below works.
      - name: Ensure shared scripts available
        run: |
          if [ ! -f .github/scripts/github-api-retry.js ]; then
            git fetch origin main --depth=1
            mkdir -p .github/scripts
            git show origin/main:.github/scripts/github-api-retry.js > .github/scripts/github-api-retry.js
          fi

      - name: Deploy preview version
        id: preview
        uses: ./.github/actions/preview-deploy
        with:
          cloudflare-api-token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          cloudflare-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          pr-number: ${{ github.event.pull_request.number }}

      - name: Upsert preview comment
        if: success()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PREVIEW_URL: ${{ steps.preview.outputs.preview-url }}
          DEPLOY_OUTPUT: ${{ steps.preview.outputs.deploy-output }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { withRetry } = require('./.github/scripts/github-api-retry.js');

            const marker = '<!-- preview -->';
            const previewUrl = process.env.PREVIEW_URL;
            const deployOutput = process.env.DEPLOY_OUTPUT || 'No output captured.';
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const sha = (process.env.SHA || '').slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;

            const header = previewUrl
              ? [
                  '✅ **Preview deployed.** Open the URL below to review this PR live.',
                  '',
                  '| | |',
                  '|:--|:--|',
                  `| **Preview URL** | [${previewUrl}](${previewUrl}) |`,
                  `| **Commit** | \`${sha}\` |`,
                  `| **Run** | [#${context.runNumber}](${runUrl}) |`,
                ]
              : [
                  '⚠️ **Preview uploaded, but no preview URL was returned.**',
                  "Confirm `preview_urls` is enabled on the Worker and the account has a workers.dev subdomain.",
                  '',
                  `**Commit:** \`${sha}\` | **Run:** [#${context.runNumber}](${runUrl})`,
                ];

            const body = [
              marker,
              '# Preview Deployment',
              '',
              ...header,
              '',
              '<details><summary><strong>Wrangler output</strong></summary>',
              '',
              '```',
              deployOutput,
              '```',
              '',
              '</details>',
              '',
              '---',
              '',
              'This is a **non-production** preview. It updates on every push and is',
              'unrelated to the live site, which only changes via the `deploy` comment flow.',
            ].join('\n');

            const comments = await withRetry(
              () =>
                github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                }),
              { attempts: 3, delayMs: 2000, label: 'List comments', core }
            );
            const existing = comments
              .filter((c) => c.body && c.body.includes(marker))
              .sort((a, b) => a.id - b.id);
            const [keep, ...dupes] = existing;
            if (keep) {
              await withRetry(
                () =>
                  github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: keep.id,
                    body,
                  }),
                { attempts: 3, delayMs: 2000, label: 'Update preview comment', core }
              );
            } else {
              await withRetry(
                () =>
                  github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body,
                  }),
                { attempts: 3, delayMs: 2000, label: 'Create preview comment', core }
              );
            }
            for (const dup of dupes) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: dup.id,
                });
              } catch (e) {
                core.debug(`Failed to delete duplicate preview comment ${dup.id}: ${e.message}`);
              }
            }

      # If the upload itself failed, the upsert step above is skipped; surface
      # the error on the PR instead of leaving only a red check no one opens.
      - name: Report preview failure
        if: failure()
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          DEPLOY_STDERR: ${{ steps.preview.outputs.deploy-stderr }}
          DEPLOY_OUTPUT: ${{ steps.preview.outputs.deploy-output }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          SHA: ${{ github.event.pull_request.head.sha }}
        with:
          script: |
            const { withRetry } = require('./.github/scripts/github-api-retry.js');

            const marker = '<!-- preview -->';
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const sha = (process.env.SHA || '').slice(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const detail =
              process.env.DEPLOY_STDERR ||
              process.env.DEPLOY_OUTPUT ||
              'See the workflow run for details.';

            const body = [
              marker,
              '# Preview Deployment',
              '',
              '❌ **Preview deploy failed.** The live site is unaffected.',
              '',
              `**Commit:** \`${sha}\` | **Run:** [#${context.runNumber}](${runUrl})`,
              '',
              '<details open><summary><strong>Error</strong></summary>',
              '',
              '```',
              detail,
              '```',
              '',
              '</details>',
            ].join('\n');

            const comments = await withRetry(
              () =>
                github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                }),
              { attempts: 3, delayMs: 2000, label: 'List comments', core }
            );
            const existing = comments
              .filter((c) => c.body && c.body.includes(marker))
              .sort((a, b) => a.id - b.id);
            const [keep, ...dupes] = existing;
            if (keep) {
              await withRetry(
                () =>
                  github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: keep.id,
                    body,
                  }),
                { attempts: 3, delayMs: 2000, label: 'Update preview comment', core }
              );
            } else {
              await withRetry(
                () =>
                  github.rest.issues.createComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    issue_number: prNumber,
                    body,
                  }),
                { attempts: 3, delayMs: 2000, label: 'Create preview comment', core }
              );
            }
            for (const dup of dupes) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: dup.id,
                });
              } catch (e) {
                core.debug(`Failed to delete duplicate preview comment ${dup.id}: ${e.message}`);
              }
            }

  cleanup:
    # On close/merge, mark the comment closed. Cloudflare has no per-PR
    # deletable resource for preview aliases (an alias points at a retained
    # version and is superseded, not deleted), so there's nothing to tear down
    # and no Cloudflare token is needed here.
    if: >-
      github.event.action == 'closed'
      && github.event.pull_request.head.repo.full_name == github.repository
      && github.event.pull_request.user.login != 'dependabot[bot]'
    name: cleanup
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    # Separate, non-cancellable group: a close must always finish updating the
    # comment, even if other PR events are churning the deploy group.
    concurrency:
      group: preview-cleanup-pr-${{ github.event.pull_request.number }}
      cancel-in-progress: false
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Checkout for retry helper
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event.pull_request.base.ref }}
          persist-credentials: false

      - name: Mark preview comment closed
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
          MERGED: ${{ github.event.pull_request.merged }}
        with:
          script: |
            const { withRetry } = require('./.github/scripts/github-api-retry.js');

            const marker = '<!-- preview -->';
            const prNumber = parseInt(process.env.PR_NUMBER, 10);
            const merged = process.env.MERGED === 'true';
            const status = merged
              ? '🟣 **PR merged.** This preview is no longer updated; the change is heading to production via the `deploy` flow.'
              : '🗑️ **PR closed.** This preview is no longer updated.';
            const body = [marker, '# Preview Deployment', '', status].join('\n');

            const comments = await withRetry(
              () =>
                github.paginate(github.rest.issues.listComments, {
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: prNumber,
                  per_page: 100,
                }),
              { attempts: 3, delayMs: 2000, label: 'List comments', core }
            );
            const existing = comments
              .filter((c) => c.body && c.body.includes(marker))
              .sort((a, b) => a.id - b.id);
            const [keep, ...dupes] = existing;
            // Nothing to do if this PR never got a preview comment.
            if (keep) {
              await withRetry(
                () =>
                  github.rest.issues.updateComment({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    comment_id: keep.id,
                    body,
                  }),
                { attempts: 3, delayMs: 2000, label: 'Update preview comment', core }
              );
            }
            for (const dup of dupes) {
              try {
                await github.rest.issues.deleteComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: dup.id,
                });
              } catch (e) {
                core.debug(`Failed to delete duplicate preview comment ${dup.id}: ${e.message}`);
              }
            }
