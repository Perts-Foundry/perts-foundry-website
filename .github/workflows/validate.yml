name: Validate

on:
  pull_request:
  issue_comment:
    types: [created]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: validate-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: true

env:
  NO_COLOR: "1"

jobs:
  validate:
    if: >-
      github.event_name == 'pull_request' ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       github.event.comment.body == 'validate')
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    steps:
      - name: React with eyes
        if: github.event_name == 'issue_comment'
        continue-on-error: true
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              comment_id: context.payload.comment.id,
              content: 'eyes',
            });

      - name: Validate commenter permissions
        if: github.event_name == 'issue_comment'
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { data } = await github.rest.repos.getCollaboratorPermissionLevel({
              owner: context.repo.owner,
              repo: context.repo.repo,
              username: context.payload.comment.user.login,
            });
            if (!['admin', 'write'].includes(data.permission)) {
              core.setFailed(
                `@${context.payload.comment.user.login} does not have write access.`
              );
            }

      - name: Get PR details for comment trigger
        if: github.event_name == 'issue_comment'
        id: comment-pr
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        with:
          script: |
            const { data: pr } = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            if (pr.state !== 'open') {
              core.setFailed('This PR is not open.');
              return;
            }
            core.setOutput('ref', pr.head.ref);
            core.setOutput('sha', pr.head.sha);

      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          ref: ${{ github.event_name == 'issue_comment' && steps.comment-pr.outputs.ref || '' }}
          fetch-depth: 0

      - name: Read Hugo version
        id: hugo-version
        run: echo "version=$(cat .hugo-version)" >> "$GITHUB_OUTPUT"

      - name: Setup Node.js
        uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
        with:
          node-version: "22"
          cache: "npm"

      - name: Setup Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6
        with:
          go-version-file: "go.mod"

      - name: Setup Hugo
        uses: peaceiris/actions-hugo@75d2e84710de30f6ff7268e08f310b60ef14033f # v3
        with:
          hugo-version: ${{ steps.hugo-version.outputs.version }}
          extended: true

      - name: Cache Hugo resources
        uses: actions/cache@668228422ae6a00e4ad889ee87cd7109ec5666a7 # v5
        with:
          path: |
            ~/.cache/hugo_cache
            resources/_gen
          key: ${{ runner.os }}-hugo-${{ hashFiles('go.sum') }}
          restore-keys: |
            ${{ runner.os }}-hugo-

      # ── Vitest (Worker unit tests) ─────────────────────────────
      - name: Run Vitest
        id: vitest
        run: |
          npm ci
          mkdir -p public
          set +e
          OUTPUT=$(npx vitest run 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -20
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── Hugo Build ──────────────────────────────────────────────
      - name: Hugo build
        id: hugo-build
        run: |
          set +e
          OUTPUT=$(hugo --gc --minify --cleanDestinationDir 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -20
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"
        env:
          HUGO_ENVIRONMENT: production

      # ── Homepage smoke test ──────────────────────────────────────
      - name: Verify homepage sections
        id: homepage-smoke
        if: steps.hugo-build.outputs.exit_code == '0'
        run: |
          ERRORS=""
          HP="public/index.html"
          # Section structure checks (9 IDs across 8 partials; problem-heading is inside hero)
          # Listed in rendering order: hero, tech-bar, metrics, certs, services, cases, process, cta
          for id in hero-heading problem-heading tech-bar-heading metrics-heading certs-heading services-heading cases-heading process-heading cta-heading; do
            if ! grep -qE "id=\"?$id\"?" "$HP"; then
              ERRORS="${ERRORS}Missing section: $id\n"
            fi
          done
          # Data binding checks (verify TOML data files populate sections)
          if ! grep -q "Kubernetes" "$HP"; then
            ERRORS="${ERRORS}Missing technology data (expected 'Kubernetes')\n"
          fi
          if ! grep -qF "\$125K+" "$HP"; then
            ERRORS="${ERRORS}Missing metrics data (expected \$125K+)\n"
          fi
          if ! grep -q "Discover" "$HP"; then
            ERRORS="${ERRORS}Missing process step data (expected 'Discover')\n"
          fi
          if ! grep -q "Terraform Associate" "$HP"; then
            ERRORS="${ERRORS}Missing certification data (expected 'Terraform Associate')\n"
          fi
          # Carousel infrastructure checks (JS depends on these DOM IDs)
          for cid in tech-carousel-items tech-carousel-dots services-carousel-grid services-carousel-dots cases-carousel-grid cases-carousel-dots; do
            if ! grep -qE "id=\"?$cid\"?" "$HP"; then
              ERRORS="${ERRORS}Missing carousel ID: $cid\n"
            fi
          done
          # Section ordering checks
          METRICS_POS=$(grep -bo 'metrics-heading' "$HP" | head -1 | cut -d: -f1)
          CERTS_POS=$(grep -bo 'certs-heading' "$HP" | head -1 | cut -d: -f1)
          SERVICES_POS=$(grep -bo 'services-heading' "$HP" | head -1 | cut -d: -f1)
          if [ -n "$METRICS_POS" ] && [ -n "$CERTS_POS" ] && [ "$METRICS_POS" -gt "$CERTS_POS" ]; then
            ERRORS="${ERRORS}Section ordering: metrics-heading must appear before certs-heading\n"
          fi
          if [ -n "$CERTS_POS" ] && [ -n "$SERVICES_POS" ] && [ "$CERTS_POS" -gt "$SERVICES_POS" ]; then
            ERRORS="${ERRORS}Section ordering: certs-heading must appear before services-heading\n"
          fi
          if [ -n "$ERRORS" ]; then
            printf '%b' "$ERRORS"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            {
              echo "output<<GHEOF"
              printf '%b' "$ERRORS"
              echo "GHEOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "All homepage sections, carousel IDs, and ordering verified."
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            {
              echo "output<<GHEOF"
              echo "All homepage sections, carousel infrastructure, and ordering verified."
              echo "GHEOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── Inner page smoke test ────────────────────────────────────
      - name: Verify inner page structure
        id: inner-smoke
        if: steps.hugo-build.outputs.exit_code == '0'
        run: |
          ERRORS=""
          # Case studies: tech tags in every page
          for f in public/case-studies/*/index.html; do
            name=$(basename "$(dirname "$f")")
            if ! grep -q 'tech-tags' "$f"; then
              ERRORS="${ERRORS}Missing tech-tags: $name\n"
            fi
          done
          # Services: numbered-steps-wrapper in every page
          for f in public/services/*/index.html; do
            name=$(basename "$(dirname "$f")")
            if ! grep -q 'numbered-steps-wrapper' "$f"; then
              ERRORS="${ERRORS}Missing numbered-steps-wrapper: $name\n"
            fi
          done
          # About: certification badges
          if ! grep -q 'certification-badges' public/about/index.html; then
            ERRORS="${ERRORS}Missing certification-badges on about page\n"
          fi
          # List pages: scroll-reveal stagger
          if ! grep -q 'data-reveal-stagger' public/services/index.html; then
            ERRORS="${ERRORS}Missing data-reveal-stagger on services list\n"
          fi
          if ! grep -q 'data-reveal-stagger' public/case-studies/index.html; then
            ERRORS="${ERRORS}Missing data-reveal-stagger on case-studies list\n"
          fi
          if [ -n "$ERRORS" ]; then
            printf '%b' "$ERRORS"
            echo "exit_code=1" >> "$GITHUB_OUTPUT"
            {
              echo "output<<GHEOF"
              printf '%b' "$ERRORS"
              echo "GHEOF"
            } >> "$GITHUB_OUTPUT"
            exit 0
          else
            echo "All inner page structures verified."
            echo "exit_code=0" >> "$GITHUB_OUTPUT"
            {
              echo "output<<GHEOF"
              echo "All inner page structures verified."
              echo "GHEOF"
            } >> "$GITHUB_OUTPUT"
          fi

      # ── htmltest ────────────────────────────────────────────────
      - name: Install htmltest
        if: steps.hugo-build.outputs.exit_code == '0'
        run: |
          curl -fsSL https://github.com/wjdp/htmltest/releases/download/v0.17.0/htmltest_0.17.0_linux_amd64.tar.gz \
            | tar -xz -C /usr/local/bin htmltest

      - name: Run htmltest
        id: htmltest
        if: steps.hugo-build.outputs.exit_code == '0'
        run: |
          set +e
          OUTPUT=$(htmltest 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -30
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── pa11y-ci (accessibility) ────────────────────────────────
      - name: Run pa11y-ci
        id: pa11y
        if: steps.hugo-build.outputs.exit_code == '0'
        run: |
          npx serve public -l 8080 --no-clipboard &
          SERVER_PID=$!
          sleep 2
          set +e
          OUTPUT=$(npx pa11y-ci 2>&1)
          EXIT_CODE=$?
          kill $SERVER_PID 2>/dev/null || true
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -40
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── Gitleaks ────────────────────────────────────────────────
      - name: Install Gitleaks
        run: |
          curl -fsSL https://github.com/gitleaks/gitleaks/releases/download/v8.24.3/gitleaks_8.24.3_linux_x64.tar.gz \
            | tar -xz -C /usr/local/bin gitleaks

      - name: Run Gitleaks
        id: gitleaks
        run: |
          set +e
          OUTPUT=$(gitleaks git --log-opts="--all" --no-banner 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -30
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── markdownlint ────────────────────────────────────────────
      - name: Run markdownlint
        id: markdownlint
        run: |
          npx markdownlint-cli2 "content/**/*.md" 2>&1 | tee /tmp/mdlint.txt || true
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            sed 's/\x1b\[[0-9;]*m//g' /tmp/mdlint.txt | tail -30
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── Prettier ────────────────────────────────────────────────
      - name: Run Prettier check
        id: prettier
        run: |
          npx prettier --no-color --check \
            "content/**/*.md" \
            ".github/**/*.yml" \
            "src/**/*.js" 2>&1 | tee /tmp/prettier.txt || true
          EXIT_CODE=${PIPESTATUS[0]}
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            sed 's/\x1b\[[0-9;]*m//g' /tmp/prettier.txt | tail -30
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── actionlint ──────────────────────────────────────────────
      - name: Run actionlint
        id: actionlint
        run: |
          curl -fsSL https://raw.githubusercontent.com/rhysd/actionlint/main/scripts/download-actionlint.bash \
            | bash -s -- latest /usr/local/bin
          set +e
          OUTPUT=$(actionlint -no-color 2>&1)
          EXIT_CODE=$?
          echo "$OUTPUT"
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          {
            echo "output<<GHEOF"
            echo "$OUTPUT" | sed 's/\x1b\[[0-9;]*m//g' | tail -20
            echo "GHEOF"
          } >> "$GITHUB_OUTPUT"

      # ── Aggregate & Comment ─────────────────────────────────────
      - name: Collect results
        id: results
        if: always()
        env:
          EXIT_VITEST: ${{ steps.vitest.outputs.exit_code }}
          EXIT_HUGO: ${{ steps.hugo-build.outputs.exit_code }}
          EXIT_SMOKE: ${{ steps.homepage-smoke.outputs.exit_code }}
          EXIT_INNER: ${{ steps.inner-smoke.outputs.exit_code }}
          EXIT_HTMLTEST: ${{ steps.htmltest.outputs.exit_code }}
          EXIT_PA11Y: ${{ steps.pa11y.outputs.exit_code }}
          EXIT_GITLEAKS: ${{ steps.gitleaks.outputs.exit_code }}
          EXIT_MDLINT: ${{ steps.markdownlint.outputs.exit_code }}
          EXIT_PRETTIER: ${{ steps.prettier.outputs.exit_code }}
          EXIT_ACTIONLINT: ${{ steps.actionlint.outputs.exit_code }}
        run: |
          PASS=0
          FAIL=0
          SKIP=0

          checks=(
            "vitest:Tests:$EXIT_VITEST"
            "hugo-build:Build:$EXIT_HUGO"
            "homepage-smoke:Smoke:$EXIT_SMOKE"
            "inner-smoke:Inner:$EXIT_INNER"
            "htmltest:HTML:$EXIT_HTMLTEST"
            "pa11y:A11y:$EXIT_PA11Y"
            "gitleaks:Security:$EXIT_GITLEAKS"
            "markdownlint:Lint:$EXIT_MDLINT"
            "prettier:Format:$EXIT_PRETTIER"
            "actionlint:CI:$EXIT_ACTIONLINT"
          )

          for check in "${checks[@]}"; do
            code="${check##*:}"
            if [ -z "$code" ]; then
              SKIP=$((SKIP + 1))
            elif [ "$code" = "0" ]; then
              PASS=$((PASS + 1))
            else
              FAIL=$((FAIL + 1))
            fi
          done

          TOTAL=$((PASS + FAIL + SKIP))
          {
            echo "pass=$PASS"
            echo "fail=$FAIL"
            echo "skip=$SKIP"
            echo "total=$TOTAL"
          } >> "$GITHUB_OUTPUT"

      - name: Post PR comment
        if: always()
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          PASS_COUNT: ${{ steps.results.outputs.pass }}
          FAIL_COUNT: ${{ steps.results.outputs.fail }}
          SKIP_COUNT: ${{ steps.results.outputs.skip }}
          TOTAL_COUNT: ${{ steps.results.outputs.total }}
          COMMENT_PR_SHA: ${{ steps.comment-pr.outputs.sha }}
          EXIT_VITEST: ${{ steps.vitest.outputs.exit_code }}
          EXIT_HUGO: ${{ steps.hugo-build.outputs.exit_code }}
          EXIT_SMOKE: ${{ steps.homepage-smoke.outputs.exit_code }}
          EXIT_INNER: ${{ steps.inner-smoke.outputs.exit_code }}
          EXIT_HTMLTEST: ${{ steps.htmltest.outputs.exit_code }}
          EXIT_PA11Y: ${{ steps.pa11y.outputs.exit_code }}
          EXIT_GITLEAKS: ${{ steps.gitleaks.outputs.exit_code }}
          EXIT_MDLINT: ${{ steps.markdownlint.outputs.exit_code }}
          EXIT_PRETTIER: ${{ steps.prettier.outputs.exit_code }}
          EXIT_ACTIONLINT: ${{ steps.actionlint.outputs.exit_code }}
          OUTPUT_VITEST: ${{ steps.vitest.outputs.output }}
          OUTPUT_HUGO: ${{ steps.hugo-build.outputs.output }}
          OUTPUT_SMOKE: ${{ steps.homepage-smoke.outputs.output }}
          OUTPUT_INNER: ${{ steps.inner-smoke.outputs.output }}
          OUTPUT_HTMLTEST: ${{ steps.htmltest.outputs.output }}
          OUTPUT_PA11Y: ${{ steps.pa11y.outputs.output }}
          OUTPUT_GITLEAKS: ${{ steps.gitleaks.outputs.output }}
          OUTPUT_MDLINT: ${{ steps.markdownlint.outputs.output }}
          OUTPUT_PRETTIER: ${{ steps.prettier.outputs.output }}
          OUTPUT_ACTIONLINT: ${{ steps.actionlint.outputs.output }}
        with:
          script: |
            const marker = '<!-- validation-results -->';
            const prSha = context.payload.pull_request
              ? context.payload.pull_request.head.sha
              : process.env.COMMENT_PR_SHA;
            const sha = prSha.substring(0, 7);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const pass = process.env.PASS_COUNT;
            const fail = process.env.FAIL_COUNT;
            const skip = process.env.SKIP_COUNT;
            const allPassed = fail === '0' && skip === '0';

            const banner = allPassed
              ? '✅ **All checks passed** — comment `deploy` to deploy and merge.'
              : `❌ **${fail} Failure(s)** — please review the details below. All checks must pass before this PR can be merged.`;

            const status = (code, skipCondition) => {
              if (skipCondition) return '⏭️';
              return code === '0' ? '✅' : '❌';
            };

            const vitestExit = process.env.EXIT_VITEST || '';
            const hugoBuild = process.env.EXIT_HUGO || '';
            const smokeExit = process.env.EXIT_SMOKE || '';
            const innerExit = process.env.EXIT_INNER || '';
            const htmltest = process.env.EXIT_HTMLTEST || '';
            const pa11y = process.env.EXIT_PA11Y || '';
            const gitleaks = process.env.EXIT_GITLEAKS || '';
            const mdlint = process.env.EXIT_MDLINT || '';
            const prettier = process.env.EXIT_PRETTIER || '';
            const actionlint = process.env.EXIT_ACTIONLINT || '';
            const htmlSkipped = hugoBuild !== '0';

            const vitestOutput = process.env.OUTPUT_VITEST || 'No output';
            const hugoOutput = process.env.OUTPUT_HUGO || '';
            const smokeOutput = process.env.OUTPUT_SMOKE || 'Skipped (build failed)';
            const innerOutput = process.env.OUTPUT_INNER || 'Skipped (build failed)';
            const htmltestOutput = process.env.OUTPUT_HTMLTEST || 'Skipped (build failed)';
            const pa11yOutput = process.env.OUTPUT_PA11Y || 'Skipped (build failed)';
            const gitleaksOutput = process.env.OUTPUT_GITLEAKS || 'No issues found';
            const mdlintOutput = process.env.OUTPUT_MDLINT || 'No issues found';
            const prettierOutput = process.env.OUTPUT_PRETTIER || 'No issues found';
            const actionlintOutput = process.env.OUTPUT_ACTIONLINT || 'No issues found';

            const body = [
              marker,
              `# Validation Report`,
              '',
              banner,
              '',
              `**Commit:** \`${sha}\` | **Run:** [#${context.runNumber}](${runUrl}) | **Results:** ${pass} passed, ${fail} failed, ${skip} skipped`,
              '',
              '---',
              '',
              '### Build & Output',
              '',
              `| Check | Tool | Result |`,
              `|:------|:-----|:------:|`,
              `| **Worker Unit Tests** | \`vitest\` | ${status(vitestExit)} |`,
              `| **Site Compilation** | \`hugo\` | ${status(hugoBuild)} |`,
              `| **Homepage Smoke Test** | \`smoke test\` | ${status(smokeExit, htmlSkipped)} |`,
              `| **Inner Page Smoke Test** | \`smoke test\` | ${status(innerExit, htmlSkipped)} |`,
              `| **Link & Image Validation** | \`htmltest\` | ${status(htmltest, htmlSkipped)} |`,
              `| **Accessibility (WCAG 2.1 AA)** | \`pa11y-ci\` | ${status(pa11y, htmlSkipped)} |`,
              '',
              '### Code Quality',
              '',
              `| Check | Tool | Result |`,
              `|:------|:-----|:------:|`,
              `| **Markdown Style** | \`markdownlint\` | ${status(mdlint)} |`,
              `| **Code Formatting** | \`prettier\` | ${status(prettier)} |`,
              `| **Workflow Validation** | \`actionlint\` | ${status(actionlint)} |`,
              '',
              '### Security',
              '',
              `| Check | Tool | Result |`,
              `|:------|:-----|:------:|`,
              `| **Secret Detection** | \`gitleaks\` | ${status(gitleaks)} |`,
              '',
              '---',
              '',
              '<details><summary><strong>Worker Unit Tests</strong> (<code>vitest</code>)</summary>',
              '',
              '```',
              vitestOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary><strong>Site Compilation</strong> (<code>hugo</code>)</summary>',
              '',
              '```',
              hugoOutput,
              '```',
              '',
              '</details>',
              '',
              `<details><summary><strong>Homepage Smoke Test</strong> (sections, carousels, data, ordering)</summary>`,
              '',
              '```',
              smokeOutput,
              '```',
              '',
              '</details>',
              '',
              `<details><summary><strong>Inner Page Smoke Test</strong> (shortcodes, metadata, stagger)</summary>`,
              '',
              '```',
              innerOutput,
              '```',
              '',
              '</details>',
              '',
              `<details><summary><strong>Link & Image Validation</strong> (<code>htmltest</code>)</summary>`,
              '',
              '```',
              htmltestOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary><strong>Accessibility</strong> (<code>pa11y-ci</code>)</summary>',
              '',
              '```',
              pa11yOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary><strong>Markdown Style</strong> (<code>markdownlint</code>)</summary>',
              '',
              '```',
              mdlintOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary><strong>Code Formatting</strong> (<code>prettier</code>)</summary>',
              '',
              '```',
              prettierOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary><strong>Workflow Validation</strong> (<code>actionlint</code>)</summary>',
              '',
              '```',
              actionlintOutput,
              '```',
              '',
              '</details>',
              '',
              '<details><summary><strong>Secret Detection</strong> (<code>gitleaks</code>)</summary>',
              '',
              '```',
              gitleaksOutput,
              '```',
              '',
              '</details>',
            ].join('\n');

            const { data: comments } = await github.rest.issues.listComments({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes(marker));

            if (existing) {
              await github.rest.issues.updateComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
                body,
              });
            }

      # ── Final status gate ───────────────────────────────────────
      - name: Check for failures
        if: always()
        env:
          EXIT_VITEST: ${{ steps.vitest.outputs.exit_code }}
          EXIT_HUGO: ${{ steps.hugo-build.outputs.exit_code }}
          EXIT_SMOKE: ${{ steps.homepage-smoke.outputs.exit_code }}
          EXIT_INNER: ${{ steps.inner-smoke.outputs.exit_code }}
          EXIT_HTMLTEST: ${{ steps.htmltest.outputs.exit_code }}
          EXIT_PA11Y: ${{ steps.pa11y.outputs.exit_code }}
          EXIT_GITLEAKS: ${{ steps.gitleaks.outputs.exit_code }}
          EXIT_MDLINT: ${{ steps.markdownlint.outputs.exit_code }}
          EXIT_PRETTIER: ${{ steps.prettier.outputs.exit_code }}
          EXIT_ACTIONLINT: ${{ steps.actionlint.outputs.exit_code }}
        run: |
          FAILED=0
          [ "$EXIT_VITEST" != "0" ] && echo "::error::Vitest worker tests failed" && FAILED=1
          [ "$EXIT_HUGO" != "0" ] && echo "::error::Hugo build failed" && FAILED=1
          if [ "$EXIT_HUGO" == "0" ] && [ "$EXIT_SMOKE" != "0" ]; then
            echo "::error::Homepage smoke test failed" && FAILED=1
          fi
          if [ "$EXIT_HUGO" == "0" ] && [ "$EXIT_INNER" != "0" ]; then
            echo "::error::Inner page smoke test failed" && FAILED=1
          fi
          if [ "$EXIT_HUGO" == "0" ] && [ "$EXIT_HTMLTEST" != "0" ]; then
            echo "::error::htmltest failed" && FAILED=1
          fi
          if [ "$EXIT_HUGO" == "0" ] && [ "$EXIT_PA11Y" != "0" ]; then
            echo "::error::pa11y-ci accessibility check failed" && FAILED=1
          fi
          [ "$EXIT_GITLEAKS" != "0" ] && echo "::error::Gitleaks detected potential secrets" && FAILED=1
          [ "$EXIT_MDLINT" != "0" ] && echo "::error::markdownlint failed" && FAILED=1
          [ "$EXIT_ACTIONLINT" != "0" ] && echo "::error::actionlint failed" && FAILED=1
          [ "$EXIT_PRETTIER" != "0" ] && echo "::error::Prettier found formatting issues" && FAILED=1
          if [ "$FAILED" -eq 1 ]; then
            exit 1
          fi
