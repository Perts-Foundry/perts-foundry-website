name = "perts-foundry-website"
main = "src/worker.js"
compatibility_date = "2026-03-07"
compatibility_flags = ["nodejs_compat"]
workers_dev = false

[assets]
directory = "./public"
binding = "ASSETS"
not_found_handling = "404-page"
html_handling = "auto-trailing-slash"
run_worker_first = ["/api/*"]
